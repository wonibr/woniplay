plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.midiaindoor.player'
    compileSdk 34

    defaultConfig {
        applicationId "com.midiaindoor.player"
        // minSdk 19 = Android 4.4. Compatível com aparelhos bem antigos
        // (Android 4.3 puro/API 18 já não roda AndroidX de forma confiavel).
        minSdk 19
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        debug {
            // build de teste: sem precisar de assinatura/keystore proprio
        }
        release {
            minifyEnabled false
            signingConfig signingConfigs.debug
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
    kotlinOptions {
        jvmTarget = '1.8'
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
