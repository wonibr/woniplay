name: Gerar APK

on:
  push:
      branches: [ main, master ]
        workflow_dispatch: {}

        jobs:
          build:
              runs-on: ubuntu-latest
                  steps:
                        - name: Baixar o codigo
                                uses: actions/checkout@v4

                                      - name: Configurar Java
                                              uses: actions/setup-java@v4
                                                      with:
                                                                distribution: 'temurin'
                                                                          java-version: '17'

                                                                                - name: Dar permissao de execucao ao gradlew (se existir)
                                                                                        run: |
                                                                                                  if [ -f "./gradlew" ]; then chmod +x ./gradlew; fi

                                                                                                        - name: Gerar o wrapper do Gradle (caso nao exista)
                                                                                                                run: gradle wrapper --gradle-version 8.6
                                                                                                                
                                                                                                                      - name: Compilar o APK (debug, pronto pra instalar e testar)
                                                                                                                              run: ./gradlew assembleDebug --stacktrace
                                                                                                                              
                                                                                                                                    - name: Disponibilizar o APK pra download
                                                                                                                                            uses: actions/upload-artifact@v4
                                                                                                                                                    with:
                                                                                                                                                              name: MidiaIndoorPlayer-apk
                                                                                                                                                                        path: app/build/outputs/apk/debug/app-debug.apk
                                                                                                                                                                        
